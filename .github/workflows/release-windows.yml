name: Build & Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build (Windows release)
        run: flutter build windows --release

      - name: Prepare artifact
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $artifactDir = "${{ github.workspace }}\\build\\windows\\x64\\runner\\Release"
          $zipName = "gaming_stats-windows-$version.zip"
          if (!(Test-Path $artifactDir)) { throw "Artifact dir not found: $artifactDir" }
          Compress-Archive -Path (Join-Path $artifactDir '*') -DestinationPath (Join-Path ${{ github.workspace }} $zipName) -Force
          echo "zip_path=${{ github.workspace }}\\$zipName" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaming_stats-windows
          path: gaming_stats-windows-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: gaming_stats-windows-${{ github.ref_name }}.zip
          draft: false
          prerelease: false

